<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ASVP Fleet</title><link rel="stylesheet" href="/fleet/assets/app.css"></head>
<body><main>
<section id="login" class="card login"><h1>ASVP Fleet</h1><p>Sign in with the central server admin token.</p><form id="login-form"><label>Admin token<input id="token" type="password" required autocomplete="current-password"></label><button>Sign in</button><p id="login-error" class="error"></p></form></section>
<section id="dashboard" hidden><header><div><h1>ASVP Fleet</h1><p id="threshold"></p></div><div><span id="live-state" class="live never-connected">Connecting</span><span id="updated"></span><button id="logout" class="secondary">Log out</button></div></header><div id="summary" class="summary"></div><div class="card"><table><thead><tr><th>Hostname</th><th>Platform</th><th>Agent ID</th><th>Status</th><th>Last heartbeat</th><th>Last poll</th></tr></thead><tbody id="agents"></tbody></table></div><section id="detail" class="card detail" hidden></section></section>
</main><script type="module" src="/fleet/assets/app.js"></script></body>
</html>
